spring:
  application:
    name: cse
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: DEBUG
    org.mongodb: INFO
    org.springframework.web: INFO
    dev.morphia.mapping.codec.pojo: INFO
  file:
    name: "./logs/cse.log"

server:
  error:
    path: "/error"
    whitelabel:
      enabled: false
  port: 8081