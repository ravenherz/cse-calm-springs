<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
        "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <base href="${pageContext.request.contextPath}"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
  <title>Resources - rhz-we</title>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/default/css/styles.css}"
        href="../static/content-public/themes/default/css/styles.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/default/css/color-schemas/snowy.css}"
        href="../static/content-public/themes/default/css/color-schemas/snowy.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/rhz-we-core/css/system.css}"
        href="../static/content-public/rhz-we-core/css/system.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/2000s/css/editor.css}"
        href="../static/content-public/themes/2000s/css/editor.css"/>
  <link rel="icon"
        th:href="@{/content-public/rhz-we-core/images/favicon.ico}"
        href="/content-public/rhz-we-core/images/favicon.ico"
        type="image/x-icon"/>
</head>
<body>
  <div class="editor-wrapper">
    <div class="editor-header">
      <h1>Admin console</h1>
      <a th:href="@{/}" class="btn btn-secondary">Back to website</a>
    </div>

    <div class="editor-nav">
      <a th:href="@{/editor/resources}">Resources</a>
      <a th:href="@{/editor/categories}">Categories</a>
      <a th:href="@{/editor/category/create}">Create category</a>
      <a th:href="@{/editor/pages}">Pages</a>
      <a th:href="@{/editor/create}">Create page</a>
    </div>


    <div class="upload-section">
      <h3>Upload New Resource</h3>
      <form th:action="@{/editor/resources/upload}" method="post" enctype="multipart/form-data" class="upload-form">
        <div class="form-group flex-1">
          <label>File</label>
          <div class="drop-zone" id="dropZone">
            <span class="drop-zone-text">Click to select or drag and drop file (jpg, png, mp3)</span>
            <input type="file" id="file" name="file" accept=".jpg,.jpeg,.png,.mp3" required/>
          </div>
        </div>
        <div class="form-group">
          <label for="resourceId">Resource ID</label>
          <input type="text" id="resourceId" name="resourceId" placeholder="my-picture" required/>
        </div>
        <input type="hidden" id="metadata" name="metadata"/>
        <button type="submit" class="btn-upload">Upload</button>
      </form>
    </div>

    <div th:if="${error}" class="error-message" th:text="${error}">
      Error message
    </div>
    
    <div class="resources-grid">
      <div th:each="resource : ${resources}" class="resource-card">
        <img th:if="${resource.resourceData.type.name() == 'IMAGE'}"
             th:src="@{/content-protected{path}(path=${resource.resourceData.pathPublic})}"
             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
             alt="Resource preview"/>
        <div th:unless="${resource.resourceData.type.name() == 'IMAGE'}" 
             class="audio-placeholder">
          Audio
        </div>
        <div class="resource-info">
          <span class="type" th:text="${resource.resourceData.type.name()}">TYPE</span>
          <span class="size" th:text="${resource.resourceData.sizeInBytes + ' bytes'}">0 bytes</span>
          <div th:if="${not #maps.isEmpty(resource.resourceData.metadata)}" class="metadata-info">
            <span th:each="entry : ${resource.resourceData.metadata}" th:text="${entry.key + ': ' + entry.value}">key: value</span>
          </div>
          <span th:if="${resource.resourceData.largeFile}" class="chunk-badge">
            <span class="chunk-info">
              <span th:text="${resource.resourceData.dataChunkIds.size() + ' chunks'}">0 chunks</span>
              <div class="chunk-tooltip" th:unless="${#lists.isEmpty(resource.resourceData.dataChunkIds)}">
                <div th:each="chunkId, iter : ${resource.resourceData.dataChunkIds}">
                  Chunk <span th:text="${iter.index + 1}">1</span>: <span th:text="${chunkId.toString()}">id</span>
                </div>
              </div>
            </span>
          </span>
          <div class="path" th:text="${resource.resourceData.pathPublic}">/path</div>
          <form th:action="@{/editor/resources/delete}" method="post" class="resource-form">
            <input type="hidden" name="pathPublic" th:value="${resource.resourceData.pathPublic}"/>
            <button type="submit" class="btn-delete" onclick="return confirm('Delete this resource?')">Delete</button>
          </form>
        </div>
      </div>
      <div th:if="${#lists.isEmpty(resources)}" class="empty-message">
        No resources uploaded yet.
      </div>
    </div>
  </div>

  <script>
    var dropZone = document.getElementById('dropZone');
    var fileInput = document.getElementById('file');
    var resourceIdInput = document.getElementById('resourceId');

    dropZone.addEventListener('click', function() {
      fileInput.click();
    });

    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) {
        fileInput.files = e.dataTransfer.files;
        handleFileSelect(e.dataTransfer.files[0]);
      }
    });

    fileInput.addEventListener('change', function() {
      if (this.files.length > 0) {
        handleFileSelect(this.files[0]);
      }
    });

    function handleFileSelect(file) {
      var fileName = file.name;
      var lastDot = fileName.lastIndexOf('.');
      if (lastDot > 0) {
        var baseName = fileName.substring(0, lastDot);
        baseName = baseName.toLowerCase().replace(/[^a-z0-9-]/g, '_');
        resourceIdInput.value = baseName;
      }
      extractMetadata(file);
    }

    function extractMetadata(file) {
      var metadata = {};
      var extension = file.name.split('.').pop().toLowerCase();
      var fileUrl = URL.createObjectURL(file);

      if (['jpg', 'jpeg', 'png', 'gif', 'webp'].indexOf(extension) !== -1) {
        var img = new Image();
        img.onload = function() {
          metadata.width = this.width;
          metadata.height = this.height;
          document.getElementById('metadata').value = JSON.stringify(metadata);
          URL.revokeObjectURL(fileUrl);
        };
        img.src = fileUrl;
      } else if (['mp3', 'wav', 'ogg', 'm4a'].indexOf(extension) !== -1) {
        var audio = new Audio();
        audio.addEventListener('loadedmetadata', function() {
          metadata.duration = Math.round(audio.duration);
          if (file.size && audio.duration) {
            metadata.bitrate = Math.round((file.size * 8) / audio.duration);
          }
          document.getElementById('metadata').value = JSON.stringify(metadata);
          URL.revokeObjectURL(fileUrl);
        });
        audio.src = fileUrl;
      }
    }
  </script>
</body>
</html>
