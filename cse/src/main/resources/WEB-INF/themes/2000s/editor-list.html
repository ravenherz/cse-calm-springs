<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
        "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <base href="${pageContext.request.contextPath}"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
  <title>Editor - rhz-we</title>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/default/css/styles.css}"
        href="../static/content-public/themes/default/css/styles.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/default/css/color-schemas/snowy.css}"
        href="../static/content-public/themes/default/css/color-schemas/snowy.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/rhz-we-core/css/system.css}"
        href="../static/content-public/rhz-we-core/css/system.css"/>
  <link rel="icon"
        th:href="@{/content-public/rhz-we-core/images/favicon.ico}"
        href="/content-public/rhz-we-core/images/favicon.ico"
        type="image/x-icon"/>
  <style>
    body { padding: 20px; background: #1a1a1a; color: #ccc; }
    .editor-container { max-width: 900px; margin: 0 auto; }
    .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #333; }
    .editor-header h1 { color: #fff; margin: 0; }
    .editor-header a { color: #888; text-decoration: none; }
    .editor-header a:hover { color: #fff; }
    .item-list { list-style: none; padding: 0; }
    .item-list li { background: #222; margin-bottom: 10px; padding: 15px 20px; border: 1px solid #333; }
    .item-list li:hover { border-color: #555; }
    .item-list a { display: block; color: #ccc; text-decoration: none; }
    .item-list a:hover { color: #fff; }
    .item-title { font-size: 1.2rem; font-weight: bold; }
    .item-meta { font-size: 0.8rem; color: #666; margin-top: 5px; }
    .empty-message { text-align: center; color: #666; padding: 40px; }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="editor-header">
      <h1>Editor</h1>
      <div>
        <a th:href="@{/editor/resources}">Resources</a> | 
        <a href="./">Back to site</a>
      </div>
    </div>
    
    <div th:if="${items.empty}" class="empty-message">
      No editable pages found.
    </div>
    
    <ul class="item-list" th:unless="${items.empty}">
      <li th:each="item : ${items}">
        <a th:href="@{/editor/edit(name=${item.uniqueUriName})}">
          <div class="item-title" th:text="${item.pageData?.title}">Page Title</div>
          <div class="item-meta">
            <span th:text="${item.uniqueUriName}">uri-name</span>
            <span th:if="${item.pageData?.tags}"> | Tags: <span th:text="${#strings.listJoin(item.pageData.tags, ', ')}">tag1, tag2</span></span>
          </div>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
