<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
        "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <base href="${pageContext.request.contextPath}"/>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">
  <title>Edit: <span th:text="${item.pageData?.title}">Page</span> - rhz-we</title>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/__${stylesTheme}__/css/styles.css}"
        href="../static/content-public/themes/default/css/styles.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/themes/__${stylesTheme}__/css/color-schemas/__${stylesSchema}__.css}"
        href="../static/content-public/themes/default/css/color-schemas/snowy.css"/>
  <link rel="stylesheet" type="text/css"
        th:href="@{/content-public/rhz-we-core/css/system.css}"
        href="../static/content-public/rhz-we-core/css/system.css"/>
  <link rel="icon"
        th:href="@{/content-public/rhz-we-core/images/favicon.ico}"
        href="/content-public/rhz-we-core/images/favicon.ico"
        type="image/x-icon"/>
  <script type="text/javascript"
          th:src="@{/content-public/js/dist/jquery.min.js}"
          src="//code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; background: #1a1a1a; color: #ccc; font-family: 'Inter', sans-serif; }
    .editor-wrapper { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #333; }
    .editor-header h1 { color: #fff; margin: 0; font-size: 1.5rem; }
    .editor-header a { color: #888; text-decoration: none; }
    .editor-header a:hover { color: #fff; }
    .editor-actions { display: flex; gap: 10px; }
    .btn { padding: 8px 16px; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: none; display: inline-block; }
    .btn-primary { background: #fff; color: #1a1a1a; }
    .btn-primary:hover { background: #ddd; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #888; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input[type="text"] { width: 100%; padding: 10px; background: #222; border: 1px solid #333; color: #ccc; font-size: 1rem; }
    .form-group input[type="text"]:focus { outline: none; border-color: #555; }
    .form-row { display: flex; gap: 20px; }
    .form-row .form-group { flex: 1; }
    .preview-container { margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
    .preview-container h3 { color: #888; margin-bottom: 15px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .preview-content { background: #222; padding: 20px; border: 1px solid #333; min-height: 100px; }
  </style>
</head>
<body>
  <div class="editor-wrapper">
    <div class="editor-header">
      <h1>Edit: <span th:text="${item.pageData?.title}">Page Title</span></h1>
      <div class="editor-actions">
        <a th:href="@{/editor}" class="btn btn-secondary">Back to list</a>
        <a th:href="@{/(page=${item.uniqueUriName})}" class="btn btn-secondary" target="_blank">View page</a>
      </div>
    </div>
    
    <form th:action="@{/editor/save}" method="post">
      <input type="hidden" name="name" th:value="${item.uniqueUriName}"/>
      
      <div class="form-row">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" th:value="${item.pageData?.title}"/>
        </div>
        <div class="form-group">
          <label for="header">Header</label>
          <input type="text" id="header" name="header" th:value="${item.pageData?.header}"/>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="subHeader">Sub Header</label>
          <input type="text" id="subHeader" name="subHeader" th:value="${item.pageData?.subHeader}"/>
        </div>
        <div class="form-group">
          <label for="tags">Tags (comma separated)</label>
          <input type="text" id="tags" name="tags" th:value="${#strings.listJoin(item.pageData?.tags, ', ')}"/>
        </div>
      </div>
      
      <div class="form-group">
        <label>Content (Markdown/HTML)</label>
        <textarea id="description" name="description" th:text="${item.pageData?.description}" rows="20" style="width:100%;background:#222;border:1px solid #333;color:#ccc;padding:10px;font-family:monospace;font-size:14px;"></textarea>
      </div>
      
      <div class="editor-actions">
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
    
    <div class="preview-container">
      <h3>Preview</h3>
      <div class="preview-content" id="preview">
        <th:block th:utext="${item.pageData?.description}"/>
      </div>
    </div>
  </div>
  
  <script type="text/javascript" th:inline="javascript">
    $(document).ready(function() {
      var rawContent = /*[[${item.pageData?.description}]]*/ '';
      if (rawContent) {
        $('#description').val(rawContent);
        $('#preview').html(rawContent);
      }
      $('#description').on('input', function() {
        $('#preview').html($(this).val());
      });
    });
  </script>
</body>
</html>
