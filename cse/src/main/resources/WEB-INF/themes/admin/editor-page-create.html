<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
        "http://www.w3.org/TR/html4/loose.dtd">
<html xmlns:th="http://www.w3.org/1999/xhtml" lang="en">
<head th:replace="~{fragments/shared :: shared-head}">
</head>
<body>
  <div class="editor-wrapper">
    <div th:replace="~{fragments/shared :: shared-editor-header}"></div>

    <div th:replace="~{fragments/shared :: shared-editor-nav}"></div>

    <div th:if="${error}" class="error-message" th:text="${error}">
      Error message
    </div>
    
    <form th:action="@{/editor/create}" method="post">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Page ID (URL name)</label>
          <input type="text" id="name" name="name" placeholder="my-page" required/>
        </div>
        <div class="form-group">
          <label for="categoryId">Category</label>
          <select id="categoryId" name="categoryId">
            <option value="">-- No Category --</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.categoryData?.itemName != null ? cat.categoryData.itemName : cat.id}">Category Name</option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title"/>
        </div>
        <div class="form-group">
          <label for="header">Header</label>
          <input type="text" id="header" name="header"/>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="subHeader">Sub Header</label>
          <input type="text" id="subHeader" name="subHeader"/>
        </div>
        <div class="form-group">
          <label for="tags">Tags (comma separated)</label>
          <input type="text" id="tags" name="tags" placeholder="tag1, tag2, tag3"/>
        </div>
      </div>
      
      <div class="form-group">
        <label>Content (Markdown/HTML)</label>
        <textarea id="description" name="description" rows="20" class="editor-textarea"></textarea>
      </div>
      
      <div class="editor-actions">
        <button type="submit" class="btn btn-secondary">Create Page</button>
      </div>
    </form>
    
    <div class="preview-container">
      <h3>Preview</h3>
      <div class="preview-content" id="preview">
      </div>
    </div>
  </div>
  
  <script type="text/javascript" th:inline="javascript">
    $(document).ready(function() {
      $('#description').on('input', function() {
        $('#preview').html($(this).val());
      });
    });
  </script>
</body>
</html>
